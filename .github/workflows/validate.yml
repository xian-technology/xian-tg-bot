name: Validate

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout xian-tg-bot
        uses: actions/checkout@v6
        with:
          path: xian-tg-bot

      - name: Checkout xian-py
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/xian-py
          ref: main
          path: xian-py

      - name: Checkout xian-contracting
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/xian-contracting
          ref: main
          path: xian-contracting

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Install dependencies
        working-directory: xian-tg-bot
        run: poetry install --with dev

      - name: Ruff lint
        working-directory: xian-tg-bot
        run: poetry run ruff check .

      - name: Run mypy
        working-directory: xian-tg-bot
        run: poetry run mypy

      - name: Run tests
        working-directory: xian-tg-bot
        run: poetry run pytest
