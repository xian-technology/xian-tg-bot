<b>Claim testnet tXIAN tokens to your bot wallet and send it to another wallet if needed.</b>

◾️ Claim testnet XIAN to your bot wallet
<code>/{{handle}} claim</code>

◾️ Show XIAN balance on testnet
<code>/{{handle}} balance</code>

◾️ Send tXIAN from your bot wallet
<code>/{{handle}} send [amount] [address]</code>
