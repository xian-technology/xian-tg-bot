✨ <b>XIAN Telegram Bot</b> ✨

Telegram bot for the <a href="https://www.xian.org">Xian</a> project. Xian is a cryptocurrency project and this bot will auto-generate a Xian wallet for you and allow you to send and receive XIAN coins and interact with the network.

For a full list of available commands, execute the /help command.
